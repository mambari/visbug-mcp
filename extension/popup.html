<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui; padding: 12px; width: 220px; color: #222; }
    h2 { font-size: 14px; margin: 0 0 8px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-right: 6px; }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    p { font-size: 12px; color: #666; margin: 4px 0 0; }
  </style>
</head>
<body>
  <h2>VisBug MCP Bridge</h2>
  <div>
    <span class="dot" id="dot"></span>
    <span id="status">Connexion…</span>
  </div>
  <p id="count"></p>
  <script src="popup.js"></script>
</body>
</html>
